<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>IRON WILL</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="IRON WILL">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000;
    --fg:#ffffff;
    --soul:#ff0000;
    --pick:#ffff00;
    --dim:#8a8a8a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:'Press Start 2P',monospace;
    display:flex;flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 16px);
    overflow:hidden;
    image-rendering:pixelated;
    user-select:none;-webkit-user-select:none;
  }
  .screen{display:none;flex:1;flex-direction:column}
  .screen.on{display:flex}

  /* ---------- shared ---------- */
  .box{
    border:4px solid var(--fg);
    box-shadow:0 0 0 4px var(--bg), 0 0 0 8px var(--fg) inset;
    outline:4px solid var(--bg);
    padding:20px 16px;
    background:var(--bg);
  }
  /* simpler double border like Undertale dialog */
  .dlg{
    border:4px solid var(--fg);
    padding:18px 14px;
    position:relative;
    background:var(--bg);
  }
  .dlg::after{
    content:'';position:absolute;inset:4px;border:2px solid var(--fg);pointer-events:none;
  }
  .txt{font-size:11px;line-height:2;letter-spacing:1px;min-height:88px}
  .txt .cur{display:inline-block;width:8px;height:12px;background:var(--fg);vertical-align:-2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  .heart{
    width:14px;height:12px;display:inline-block;flex:0 0 auto;
    background:
      conic-gradient(var(--soul) 0 0);
    clip-path:polygon(15% 0,42% 0,42% 15%,58% 15%,58% 0,85% 0,100% 15%,100% 45%,85% 60%,70% 75%,58% 88%,50% 100%,42% 88%,30% 75%,15% 60%,0 45%,0 15%);
  }
  .beat{animation:beat 1.1s infinite}
  @keyframes beat{0%,100%{transform:scale(1)}12%{transform:scale(1.28)}24%{transform:scale(1)}36%{transform:scale(1.18)}48%{transform:scale(1)}}
  @media (prefers-reduced-motion:reduce){
    .beat{animation:none}
    .txt .cur{animation:none}
  }

  .opt{
    display:flex;align-items:center;gap:14px;
    font-size:14px;letter-spacing:2px;
    padding:16px 8px;cursor:pointer;color:var(--fg);
    background:none;border:none;font-family:inherit;text-align:left;width:100%;
  }
  .opt .heart{visibility:hidden}
  .opt.sel{color:var(--pick)}
  .opt.sel .heart{visibility:visible}
  .opt:active{transform:translateX(2px)}

  .eyebrow{font-size:8px;color:var(--dim);letter-spacing:3px;margin-bottom:10px}

  /* ---------- check-in ---------- */
  #checkin{justify-content:center;gap:34px}
  #checkin .q{font-size:15px;line-height:2.1;text-align:center;letter-spacing:1px}
  #checkin .opts{display:flex;flex-direction:column;gap:4px;align-self:center;min-width:210px}

  /* ---------- main ---------- */
  #main{justify-content:space-between;gap:14px}
  .hud{display:flex;justify-content:space-between;align-items:center;font-size:8px;color:var(--dim);letter-spacing:2px}
  .hud button{background:none;border:2px solid var(--dim);color:var(--dim);font-family:inherit;font-size:8px;padding:8px 10px;letter-spacing:2px;cursor:pointer}
  .counter{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;min-height:0}
  .num{
    font-size:clamp(72px,30vw,130px);
    color:var(--fg);
    text-shadow:6px 6px 0 #3a0000;
    line-height:1;
  }
  .lbl{font-size:10px;line-height:2;text-align:center;color:var(--fg);letter-spacing:1px;max-width:300px}
  .lv{font-size:9px;color:var(--pick);letter-spacing:2px}
  .counter .heart{width:26px;height:22px}
  .nav{display:flex;gap:10px}
  .nav button{
    flex:1;background:none;border:4px solid var(--fg);color:var(--fg);
    font-family:inherit;font-size:9px;letter-spacing:2px;padding:16px 6px;cursor:pointer;
  }
  .nav button:active{background:var(--fg);color:var(--bg)}

  /* ---------- mind ---------- */
  #mind{justify-content:space-between;gap:14px}
  #mind .head{font-size:13px;letter-spacing:2px;display:flex;align-items:center;gap:12px}
  #mind .body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px;min-height:0}
  .stat{font-size:8px;color:var(--dim);line-height:2;letter-spacing:1px}
</style>
</head>
<body>

<!-- ======== CHECK-IN ======== -->
<section id="checkin" class="screen">
  <p class="q">* DID YOU DRINK<br>TODAY?</p>
  <div class="opts">
    <button class="opt sel" id="optNo"><span class="heart"></span>NO</button>
    <button class="opt" id="optYes"><span class="heart"></span>YES</button>
  </div>
</section>

<!-- ======== MAIN ======== -->
<section id="main" class="screen">
  <div class="hud">
    <span id="dateLbl"></span>
    <button id="sndBtn">SND ON</button>
  </div>
  <div class="counter">
    <span class="heart beat"></span>
    <div class="num" id="num">0</div>
    <div class="lbl">THAT'S HOW MANY DAYS<br>YOU HAVEN'T DRUNK</div>
    <div class="lv" id="lv"></div>
  </div>
  <div class="dlg">
    <p class="txt" id="quote"></p>
  </div>
  <div class="nav">
    <button id="toMind">IRON MIND</button>
    <button id="newQuote">NEW QUOTE</button>
  </div>
</section>

<!-- ======== IRON MIND ======== -->
<section id="mind" class="screen">
  <div class="head"><span class="heart"></span>IRON MIND</div>
  <div class="body">
    <div class="dlg">
      <p class="txt" id="mindTxt"></p>
    </div>
    <p class="stat" id="mindStat"></p>
  </div>
  <div class="nav">
    <button id="another">TALK TO ME</button>
    <button id="back">BACK</button>
  </div>
</section>

<script>
/* ================= DATA ================= */
// Original quotes written in a hard, disciplined, red-pill register.
const QUOTES = [
  "* ALCOHOL IS RENT YOU PAY TO STAY WEAK. STOP PAYING.",
  "* A MAN WHO CONTROLS HIS URGES CONTROLS HIS LIFE. EVERYONE ELSE IS A PASSENGER.",
  "* ТЫ ЛИБО ХОЗЯИН СВОИХ ЖЕЛАНИЙ, ЛИБО ИХ РАБ. ТРЕТЬЕГО НЕТ.",
  "* NOBODY IS COMING TO SAVE YOU. GOOD. YOU DON'T NEED SAVING. YOU NEED DISCIPLINE.",
  "* THE BOTTLE NEVER MADE A SINGLE MAN STRONGER. NOT ONCE IN HISTORY.",
  "* КАЖДЫЙ ТРЕЗВЫЙ ДЕНЬ — ЭТО КИРПИЧ. ТЫ СТРОИШЬ КРЕПОСТЬ.",
  "* COMFORT IS A DRUG. ALCOHOL IS ITS DEALER. FIRE THEM BOTH.",
  "* WEAK MEN DRINK TO FORGET. STRONG MEN STAY SHARP TO CONQUER.",
  "* СЛАБАКИ ИЩУТ ПОВОД ВЫПИТЬ. СИЛЬНЫЕ ИЩУТ ПОВОД СТАТЬ ЛУЧШЕ.",
  "* YOUR FUTURE SELF IS WATCHING YOU RIGHT NOW THROUGH MEMORIES. MAKE HIM PROUD.",
  "* DISCIPLINE IS CHOOSING WHAT YOU WANT MOST OVER WHAT YOU WANT NOW.",
  "* ПОХМЕЛЬЕ — ЭТО ПРОЦЕНТЫ ПО КРЕДИТУ, КОТОРЫЙ ТЫ ВЗЯЛ У СВОЕГО БУДУЩЕГО.",
  "* EVERY MAN YOU ADMIRE HAS ONE THING IN COMMON: CONTROL. START WITH THE GLASS.",
  "* THE GYM, THE BANK ACCOUNT, THE MIND. ALCOHOL ROBS ALL THREE.",
  "* ТРЕЗВОСТЬ — ЭТО НЕ ОГРАНИЧЕНИЕ. ЭТО ЧИТ-КОД.",
  "* YOU DON'T NEED LIQUID COURAGE. YOU NEED REAL COURAGE. IT'S BUILT SOBER.",
  "* AVERAGE MEN CELEBRATE FRIDAY WITH A BOTTLE. DANGEROUS MEN USE IT TO GET AHEAD.",
  "* БУДЬ ОПАСЕН СВОЕЙ ДИСЦИПЛИНОЙ, А НЕ СВОИМИ ВЫХОДКАМИ.",
  "* PAIN OF DISCIPLINE: GRAMS. PAIN OF REGRET: TONS. PICK YOUR WEIGHT.",
  "* A CLEAR MIND IS A LOADED WEAPON. DON'T POUR WATER IN THE BARREL.",
  "* ТВОИ КОНКУРЕНТЫ НАДЕЮТСЯ, ЧТО ТЫ СЕГОДНЯ ВЫПЬЕШЬ. РАЗОЧАРУЙ ИХ.",
  "* EXCUSES ARE THE ONLY THING ALCOHOL POURS GENEROUSLY.",
  "* KINGS ARE JUDGED BY WHAT THEY REFUSE. REFUSE THE GLASS.",
  "* СЕГОДНЯ ТЫ СКАЗАЛ 'НЕТ' БУТЫЛКЕ. ЗНАЧИТ, СКАЗАЛ 'ДА' СЕБЕ.",
  "* YOUR BLOODLINE SURVIVED WARS, FAMINE AND EMPIRES. DON'T LET IT LOSE TO A DRINK.",
  "* MOTIVATION IS FOR AMATEURS. YOU RUN ON DISCIPLINE NOW.",
  "* НАСТОЯЩИЙ МУЖЧИНА ДЕРЖИТ СЛОВО. ОСОБЕННО СЛОВО, ДАННОЕ СЕБЕ.",
  "* SOBRIETY IS THE FIRST BUSINESS YOU BUILD. IT PAYS DIVIDENDS DAILY.",
  "* NOBODY EVER WOKE UP HUNGOVER AND SAID: I'M WINNING.",
  "* ЖЕЛЕЗО КУЁТСЯ ОГНЁМ. ХАРАКТЕР — ОТКАЗОМ."
];

const MIND = [
  "* LISTEN. YOU ARE NOT ALONE IN THIS FIGHT.\n* MILLIONS OF MEN ARE IN THE SAME TRENCH TONIGHT, SAYING NO.\n* YOU'RE PART OF AN ARMY.",
  "* CRAVING RIGHT NOW? GOOD.\n* THAT'S THE OLD YOU DYING.\n* IT LASTS 15 MINUTES. DO 20 PUSH-UPS AND WATCH IT RETREAT.",
  "* ТЯЖЕЛО? ЗНАЧИТ, ИДЁТ РОСТ.\n* ЛЕГКО БЫВАЕТ ТОЛЬКО ВНИЗ ПО СКЛОНУ.\n* ТЫ ИДЁШЬ ВВЕРХ, БРАТ.",
  "* CHECKING ON YOUR MIND IS NOT SOFT.\n* A GENERAL INSPECTS HIS WEAPONS.\n* YOUR MIND IS THE MAIN ONE.",
  "* BAD DAY? WARRIORS HAVE BAD DAYS.\n* THEY JUST DON'T MAKE PERMANENT DECISIONS ABOUT THEM.\n* SLEEP. TRAIN. REPEAT.",
  "* ТЫ НЕ ОДИН. ЗАПОМНИ ЭТО.\n* ЗА КАЖДЫМ СИЛЬНЫМ МУЖИКОМ СТОЯТ ДРУГИЕ СИЛЬНЫЕ МУЖИКИ.\n* НАЙДИ СВОИХ. ГОВОРИ С НИМИ.",
  "* FEELING LOW IS DATA, NOT DEFEAT.\n* READ THE DATA: SLEEP MORE, TRAIN HARDER, TALK TO A BROTHER.\n* THEN EXECUTE.",
  "* THE URGE TO DRINK IS JUST A SIGNAL YOU'RE UNDER-STIMULATED.\n* COLD SHOWER. WALK. WORK.\n* GIVE THE BEAST A REAL JOB.",
  "* ГОВОРИТЬ О ПРОБЛЕМАХ — НЕ СЛАБОСТЬ.\n* СЛАБОСТЬ — ЗАЛИВАТЬ ИХ И ДЕЛАТЬ ВИД, ЧТО ИХ НЕТ.",
  "* IF THE WEIGHT GETS TOO HEAVY, A SMART FIGHTER CALLS HIS CORNER.\n* A COACH, A BROTHER, A PROFESSIONAL.\n* THAT'S STRATEGY, NOT SURRENDER.",
  "* YOU SURVIVED 100% OF YOUR WORST DAYS SO FAR.\n* UNDEFEATED RECORD.\n* DON'T RETIRE NOW.",
  "* ОДИН ДЕНЬ ЗА РАЗ. ОДИН РАУНД ЗА РАЗ.\n* НИКТО НЕ ВЫИГРЫВАЕТ БОЙ ЦЕЛИКОМ.\n* ЕГО ВЫИГРЫВАЮТ ПО РАУНДАМ."
];

const RELAPSE = "* YOU FELL. IT HAPPENS TO SOLDIERS.\n* COWARDS STAY DOWN. YOU WON'T.\n* THE COUNTER RESETS. YOUR WAR DOESN'T.\n* DAY ONE STARTS NOW.";
const FIRST = "* SO YOU DECIDED TO FIGHT.\n* GOOD. DETERMINATION IS ALL YOU NEED.\n* COME BACK EVERY DAY AND ANSWER ONE QUESTION.";

/* ================= STATE ================= */
const KEY = 'ironwill.v1';
const todayStr = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const load = () => { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ return {}; } };
const save = s => localStorage.setItem(KEY, JSON.stringify(s));
let S = load();
let sndOn = S.snd !== false;

function daysBetween(a,b){
  const d1=new Date(a+'T00:00:00'), d2=new Date(b+'T00:00:00');
  return Math.max(0, Math.round((d2-d1)/86400000));
}
function streak(){
  if(!S.lastDrink && !S.start) return 0;
  return daysBetween(S.lastDrink || S.start, todayStr());
}
function level(n){
  if(n>=365) return 'LV 20 * ABSOLUTE UNIT';
  if(n>=180) return 'LV 15 * WARLORD';
  if(n>=90)  return 'LV 10 * IRON MAN';
  if(n>=30)  return 'LV 7 * DISCIPLINED';
  if(n>=14)  return 'LV 5 * SOLDIER';
  if(n>=7)   return 'LV 3 * FIGHTER';
  if(n>=3)   return 'LV 2 * AWAKENED';
  if(n>=1)   return 'LV 1 * RECRUIT';
  return 'LV 0 * DAY ONE';
}

/* ================= SOUND ================= */
let AC=null;
function blip(){
  if(!sndOn) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='square'; o.frequency.value=440+Math.random()*120;
    g.gain.setValueAtTime(0.03,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.05);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime+0.05);
  }catch(e){}
}

/* ================= TYPEWRITER ================= */
let typing=null;
function type(el, text, done){
  clearInterval(typing);
  el.innerHTML='';
  let i=0;
  typing=setInterval(()=>{
    if(i>=text.length){
      clearInterval(typing);
      el.innerHTML=el.textContent.replace(/\n/g,'<br>');
      if(done) done();
      return;
    }
    const ch=text[i++];
    el.textContent+=ch;
    el.innerHTML=el.textContent.replace(/\n/g,'<br>')+'<span class="cur"></span>';
    if(ch!==' ' && ch!=='\n' && i%2===0) blip();
  },28);
}

/* ================= SCREENS ================= */
const scr = id => {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
};

function quoteOfDay(){
  const d=new Date();
  const seed=d.getFullYear()*372+(d.getMonth()+1)*31+d.getDate();
  return QUOTES[seed % QUOTES.length];
}
let quoteIdx=-1;

function renderMain(msg){
  const n=streak();
  document.getElementById('num').textContent=n;
  document.getElementById('lv').textContent=level(n);
  const d=new Date();
  document.getElementById('dateLbl').textContent=d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}).toUpperCase();
  document.getElementById('sndBtn').textContent=sndOn?'SND ON':'SND OFF';
  scr('main');
  type(document.getElementById('quote'), msg || quoteOfDay());
}

/* ================= EVENTS ================= */
document.getElementById('optNo').onclick=()=>{
  const first=!S.start;
  if(!S.start) S.start=todayStr();
  S.lastCheck=todayStr(); save(S);
  renderMain(first?FIRST:null);
};
document.getElementById('optYes').onclick=()=>{
  if(!S.start) S.start=todayStr();
  S.lastDrink=todayStr(); S.lastCheck=todayStr(); save(S);
  renderMain(RELAPSE);
};
document.querySelectorAll('#checkin .opt').forEach(b=>{
  b.addEventListener('touchstart',()=>{
    document.querySelectorAll('#checkin .opt').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); blip();
  },{passive:true});
});
document.getElementById('newQuote').onclick=()=>{
  quoteIdx=(quoteIdx<0?Math.floor(Math.random()*QUOTES.length):(quoteIdx+1)%QUOTES.length);
  type(document.getElementById('quote'), QUOTES[quoteIdx]);
};
document.getElementById('toMind').onclick=()=>{
  scr('mind');
  const n=streak();
  document.getElementById('mindStat').textContent=
    '* STATUS: '+n+' DAYS CLEAN. BODY REPAIRING. MIND SHARPENING. KEEP GOING.';
  type(document.getElementById('mindTxt'), MIND[Math.floor(Math.random()*MIND.length)]);
};
document.getElementById('another').onclick=()=>{
  type(document.getElementById('mindTxt'), MIND[Math.floor(Math.random()*MIND.length)]);
};
document.getElementById('back').onclick=()=>renderMain();
document.getElementById('sndBtn').onclick=e=>{
  sndOn=!sndOn; S.snd=sndOn; save(S);
  e.target.textContent=sndOn?'SND ON':'SND OFF';
};

/* ================= BOOT ================= */
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
if(S.lastCheck===todayStr()){ renderMain(); } else { scr('checkin'); }
</script>
</body>
</html>
